steps:
# 1. Build the Docker image
# This step uses the standard Docker builder to build the image.
# - The '-t' flag tags the image with its future Artifact Registry path.
# - './cw-antigravity' tells Docker to use the Dockerfile located in that subdirectory.
- name: 'gcr.io/cloud-builders/docker'
  args: [
    'build', 
    '-t', 
    'europe-west3-docker.pkg.dev/gcparty/container-images-repos/antigravity:latest', 
    './cw-antigravity'
  ]

# 2. Push the Docker image to Artifact Registry
# This step pushes the image built and tagged in the previous step.
- name: 'gcr.io/cloud-builders/docker'
  args: [
    'push', 
    'europe-west3-docker.pkg.dev/gcparty/container-images-repos/antigravity:latest'
  ]

# 3. (Optional but Recommended) List the final image
# This explicitly lists the image produced by the build, making it easy to see
# in the build's artifact details in the Google Cloud console.
images:
- 'europe-west3-docker.pkg.dev/gcparty/container-images-repos/antigravity:latest'

# --- Add this section ---
options:
  logging: CLOUD_LOGGING_ONLY
